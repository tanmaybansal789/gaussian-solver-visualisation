<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gaussian solver visualisation</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 32px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            line-height: 1.6;
            min-height: 100vh;
        }

        header {
            margin-bottom: 32px;
        }

        header h1, header h1 a {
            margin: 0;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -0.5px;
            color: #f1f5f9;
        }

        .controls {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            row-gap: 14px;
            flex-wrap: wrap;
        }

        .controls button {
            margin-right: 4px;
        }

        .main-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }

        .sidebar {
            width: 560px;
            min-width: 560px;
            max-width: 560px;
            flex: 0 0 560px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            background: #1e293b; 
            color: #94a3b8;
            border: 1px solid #334155;
            
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 20px;
            font-family: inherit;
            font-weight: 500;
            cursor: pointer;
            
            transition: all 0.2s ease-in-out;
        }

        button:disabled {
            background: #0f172a;
            color: #64748b;
            border-color: #334155;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: #334155;
            color: #f1f5f9;
            border-color: #475569;
        }

        #auto-step-button.active {
            background: #2d1616;
            color: #fecaca;
            border-color: #7f1d1d;
        }

        #auto-step-button.active:hover {
            background: #451a1a;
            color: #ffffff;
            border-color: #991b1b;
        }
        
        .speed-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .unknowns-control {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #speed-slider {
            width: 150px;
            height: 4px;
            border-radius: 2px;
            background: #334155;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        #unknowns-slider {
            width: 150px;
            height: 4px;
            border-radius: 2px;
            background: #334155;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }

        #unknowns-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
        }

        #speed-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: none;
        }

        #unknowns-slider::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            border: none;
        }

        #speed-label {
            font-size: 20px;
            color: #94a3b8;
            min-width: 85px;
        }

        #unknowns-label {
            font-size: 20px;
            color: #94a3b8;
            min-width: 100px;
        }

        #status-text {
            font-size: 20px;
            color: #cbd5e1;
            flex: 1 0 100%;
        }

        #system-layout {
            display: flex;
            align-items: stretch;
            gap: 20px;
            margin-bottom: 32px;
        }

        #coefficient-matrix,
        #solution-vector,
        #result-vector {
            display: grid;
            gap: 8px;
            grid-auto-rows: max-content;
            align-content: flex-start;
        }

        #system-layout > div {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 0 0 auto;
            min-height: 130px;
        }

        #system-layout > div h3 {
            margin: 0 0 12px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            height: 32px;
            line-height: 32px;
            white-space: nowrap;
            text-align: center;
        }

        #equals-sign,
        #times-sign {
            font-size: 32px;
            font-weight: 300;
            padding: 0 8px;
            color: #64748b;
            flex: 0 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell {
            width: 60px;
            height: 60px;
            border: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.3s ease, border-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
        }

        .cell:hover {
            background: #334155;
            border-color: #3b82f6;
            transform: scale(1.08);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.4);
            cursor: pointer;
        }

        .cell-input {
            width: 60px;
            height: 60px;
            border: 2px solid #3b82f6;
            border-radius: 6px;
            background: #1e293b;
            color: #e2e8f0;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            padding: 0;
            font-family: inherit;
        }

        .cell-input:focus {
            outline: none;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
        }

        .solution-cell {
            animation: solutionAppear 0.3s ease-in-out forwards;
        }

        @keyframes solutionAppear {
            from {
                opacity: 0;
                transform: scale(0.85);
                box-shadow: 0 0 0 rgba(55, 76, 195, 0);
            }
            to {
                opacity: 1;
                transform: scale(1);
                box-shadow: 0 0 12px rgba(55, 76, 195, 0.4);
            }
        }

        @keyframes slideHighlight {
            from {
                background: #1e3a8a;
                box-shadow: inset 0 0 12px rgba(59, 130, 246, 0.5);
            }
            to {
                background: #1e293b;
                box-shadow: inset 0 0 0 rgba(59, 130, 246, 0.0);
            }
        }

        #highlight-box {
            position: absolute;
            width: 60px;
            height: 60px;
            border: 2px solid #3b82f6;
            border-radius: 6px;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.5), inset 0 0 8px rgba(59, 130, 246, 0.3);
            z-index: 10;
        }

        .cell.highlighting {
            animation: slideHighlight 0.6s ease-in-out forwards;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal.hidden {
            display: none;
        }

        .modal-card {
            width: min(92vw, 460px);
            background: #1e293b;
            border-radius: 8px;
            padding: 28px;
            border: 1px solid #334155;
        }

        .modal-card h2 {
            margin: 0 0 16px;
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
        }

        #solution-text {
            margin: 0 0 20px;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.6;
        }

        #close-solution {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 10px 20px;
            border-radius: 6px;
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        #close-solution:hover {
            background: #1e293b;
            border-color: #475569;
        }

        #operation-panel, #controls-panel {
            width: 100%;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 20px;
            background: #1e293b;
            overflow-y: auto;
        }

        #operation-panel {
            height: 250px;
        }

        #controls-panel {
            height: 260px;
        }

        #operation-panel h3, #controls-panel h3 {
            margin: 0 0 16px;
            font-size: 15px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
        }

        .op-row {
            margin: 12px 0;
            font-size: 20px;
            line-height: 1.5;
            display: grid;
            grid-template-columns: 150px 1fr;
            align-items: start;
            column-gap: 8px;
            min-height: 24px;
        }

        .op-label {
            font-weight: 600;
            color: #94a3b8;
            display: block;
        }

        #op-name,
        #op-operands,
        #op-explanation {
            color: #cbd5e1;
            display: block;
            min-width: 0;
            overflow-wrap: anywhere;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            header h1 {
                font-size: 24px;
            }

            #system-layout {
                flex-direction: column;
                align-items: flex-start;
                gap: 24px;
            }

            .controls {
                flex-direction: column;
                align-items: flex-start;
            }

            .main-layout {
                flex-direction: column;
                align-items: flex-start;
            }

            .sidebar {
                width: 100%;
                min-width: 0;
                max-width: 560px;
                flex: 1 1 auto;
            }

            #operation-panel {
                width: 100%;
                min-width: 0;
                max-width: 560px;
                flex: 1 1 auto;
            }

            #controls-panel {
                width: 100%;
                min-width: 0;
                max-width: 560px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>gaussian solver visualisation | 
            <a href="https://blog.tanmaybansal789.workers.dev" target="_blank" rel="noopener noreferrer">
                @tanmaybansal789
            </a>
        </h1>
    </header>

    <div class="main-layout">
        <div id="system-layout">
            <div style="display: flex; flex-direction: column; align-items: center;">
                <h3>coefficient matrix</h3>
                <div id="coefficient-matrix-container" style="position: relative;">
                    <div id="coefficient-matrix"></div>
                    <div id="highlight-box" style="display: none;"></div>
                </div>
            </div>

            <div id="times-sign"> by </div>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <h3>solution vector</h3>
                <div id="solution-vector-container" style="position: relative;">
                    <div id="solution-vector"></div>
                </div>
            </div>

            <div id="equals-sign">=</div>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <h3>result vector</h3>
                <div id="result-vector-container" style="position: relative;">
                    <div id="result-vector"></div>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <section id="operation-panel" aria-live="polite">
                <h3>operation info</h3>
                <div class="op-row"><span class="op-label">operation:</span><span id="op-name">waiting to start</span></div>
                <div class="op-row"><span class="op-label">operands:</span><span id="op-operands">-</span></div>
                <div class="op-row"><span class="op-label">explanation:</span><span id="op-explanation">click step to begin solving.</span></div>
            </section>

            <section id="controls-panel" aria-label="controls">
                <h3>controls</h3>
                <div class="controls">
                    <button id="step-button">step</button>
                    <button id="auto-step-button">autostep</button>
                    <button id="reset-button">reset</button>
                    <div class="speed-control">
                        <label for="speed-slider" id="speed-label"></label>
                        <input type="range" id="speed-slider" min="0.5" max="50" step="0.1" value="1" />
                    </div>
                    <div class="unknowns-control">
                        <label for="unknowns-slider" id="unknowns-label"></label>
                        <input type="range" id="unknowns-slider" min="2" max="20" step="1" value="10" />
                    </div>
                    <span id="status-text"></span>
                </div>
            </section>
        </div>
    </div>

    <div id="solution-modal" class="modal hidden" aria-hidden="true">
        <div class="modal-card">
            <h2>solution complete</h2>
            <p id="solution-text"></p>
            <button id="close-solution">close</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
